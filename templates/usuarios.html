<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>BarberApp — Usuarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<aside class="sidebar">
  <div class="brand">✦ BarberApp</div>
  <nav>
    <a href="/" class="nav-item">⌂ Dashboard</a>
    <a href="/citas" class="nav-item">◷ Citas</a>
    <a href="/clientes" class="nav-item">◉ Clientes</a>
    <a href="/barberos" class="nav-item">✂ Barberos</a>
    <a href="/usuarios" class="nav-item active">👤 Usuarios</a>
  </nav>
  <div style="margin-top:auto;">
    <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="sidebar-footer">v1.0 · 2025</div>
</aside>
<main class="main">
  <header class="topbar">
    <h1 class="page-title">Usuarios</h1>
    <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo usuario</button>
  </header>
  <section class="content">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th>
          </tr></thead>
          <tbody id="tabla-body"><tr><td colspan="4" class="empty">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<div id="overlay" class="overlay hidden" onclick="cerrarModal()"></div>
<div id="modal" class="modal hidden">
  <div class="modal-header">
    <h3>Nuevo usuario</h3>
    <button class="modal-close" onclick="cerrarModal()">✕</button>
  </div>
  <div class="form-group"><label>Nombre *</label><input id="f-nombre" class="form-control" placeholder="Nombre completo"/></div>
  <div class="form-group"><label>Email *</label><input id="f-email" class="form-control" placeholder="correo@ejemplo.com" type="email"/></div>
  <div class="form-group"><label>Contraseña *</label><input id="f-password" class="form-control" placeholder="Contraseña segura" type="password"/></div>
  <div class="form-group"><label>Rol *</label>
    <select id="f-rol" class="form-control">
      <option value="admin">Administrador</option>
      <option value="recepcionista" selected>Recepcionista</option>
      <option value="barbero">Barbero</option>
    </select>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
    <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="guardar()">Guardar</button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script>
const ROLES = {admin:"Administrador", recepcionista:"Recepcionista", barbero:"Barbero"};

async function cargar() {
  const data = await fetch("/auth/usuarios").then(r=>r.json());
  document.getElementById("tabla-body").innerHTML = data.length===0
    ? `<tr><td colspan="4" class="empty">No hay usuarios registrados</td></tr>`
    : data.map(u=>`<tr>
        <td>${u.nombre}</td>
        <td>${u.email}</td>
        <td><span class="badge" style="background:#242118;color:#c9a84c;">${ROLES[u.rol]||u.rol}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="eliminar('${u._id}')">✕ Eliminar</button></td>
      </tr>`).join("");
}

function abrirModal() {
  ["f-nombre","f-email","f-password"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-rol").value = "recepcionista";
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function cerrarModal() {
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("modal").classList.add("hidden");
}

async function guardar() {
  const body = {
    nombre:   document.getElementById("f-nombre").value.trim(),
    email:    document.getElementById("f-email").value.trim(),
    password: document.getElementById("f-password").value,
    rol:      document.getElementById("f-rol").value,
  };
  if (!body.nombre||!body.email||!body.password) { toast("Completa todos los campos","error"); return; }
  const res = await fetch("/auth/usuarios", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) { toast(data.error,"error"); return; }
  toast("Usuario creado","ok");
  cerrarModal();
  cargar();
}

async function eliminar(id) {
  if (!confirm("¿Eliminar este usuario?")) return;
  await fetch(`/auth/usuarios/${id}`, {method:"DELETE"});
  toast("Usuario eliminado","ok");
  cargar();
}

async function logout() {
  await fetch("/auth/logout", {method:"POST"});
  window.location.href = "/auth/login";
}

function toast(msg, tipo) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${tipo==="error"?"toast-error":"toast-ok"}`;
  setTimeout(()=>t.className="toast hidden", 3000);
}

cargar();
</script>
</body>
</html>
