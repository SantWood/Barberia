<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarberApp — Reportes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap.tall { height: 300px; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 4px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
      opacity: 0.6;
    }
    .kpi-icon { font-size: 22px; margin-bottom: 8px; }
    .kpi-value {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1;
    }
    .kpi-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: .6px; }
    .loading { text-align: center; color: var(--muted); padding: 60px; }
    .section-header {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--text);
      margin: 28px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">✦ BarberApp</div>
  <nav>
    <a href="/" class="nav-item">⌂ Dashboard</a>
    <a href="/citas" class="nav-item">◷ Citas</a>
    <a href="/clientes" class="nav-item">◉ Clientes</a>
    <a href="/barberos" class="nav-item">✂ Barberos</a>
    <a href="/reportes" class="nav-item active">📊 Reportes</a>
  </nav>
  <div class="sidebar-footer">v1.0 · 2025</div>
</aside>

<main class="main">
  <header class="topbar">
    <h1 class="page-title">Reportes</h1>
    <span id="fecha-hoy" style="color:#8a8274;font-size:14px;"></span>
  </header>

  <section class="content" id="contenido">
    <div class="loading">Cargando datos...</div>
  </section>
</main>

<script>
const GOLD   = '#c9a84c';
const GOLD2  = 'rgba(201,168,76,0.15)';
const COLORS = ['#c9a84c','#4caf82','#e07070','#7eb8d4','#c97a4c','#9b7ec9'];

Chart.defaults.color = '#8a8274';
Chart.defaults.borderColor = '#2e2b25';
Chart.defaults.font.family = 'DM Sans';

function fmt(n) {
  return n >= 1000000
    ? '$' + (n/1000000).toFixed(1) + 'M'
    : n >= 1000 ? '$' + (n/1000).toFixed(0) + 'k'
    : '$' + n;
}

function makeChart(id, config) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, config);
}

async function init() {
  document.getElementById('fecha-hoy').textContent =
    new Date().toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const res  = await fetch('/api/reportes/resumen');
  const data = await res.json();
  const { totales, por_estado, por_servicio, por_barbero, por_dia } = data;

  document.getElementById('contenido').innerHTML = `
    <div class="kpi-grid" id="kpis"></div>
    <div class="section-header">📈 Actividad y tendencias</div>
    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">◷ Citas por día</div>
        <div class="chart-wrap tall"><canvas id="c-dias"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">✂ Citas por barbero</div>
        <div class="chart-wrap"><canvas id="c-barberos"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">◉ Estado de las citas</div>
        <div class="chart-wrap"><canvas id="c-estados"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">💈 Servicios más solicitados</div>
        <div class="chart-wrap"><canvas id="c-servicios"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">💰 Ingresos estimados por servicio</div>
        <div class="chart-wrap"><canvas id="c-ingresos"></canvas></div>
      </div>
    </div>
  `;

  // KPIs
  document.getElementById('kpis').innerHTML = [
    { icon: '◷', value: totales.citas,    label: 'Total citas',      color: GOLD },
    { icon: '◉', value: totales.clientes, label: 'Clientes activos', color: '#7eb8d4' },
    { icon: '✂', value: totales.barberos, label: 'Barberos activos', color: '#4caf82' },
    { icon: '💰', value: fmt(totales.ingresos), label: 'Ingresos estimados', color: '#c97a4c', raw: true },
  ].map(k => `
    <div class="kpi">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-value" style="color:${k.color}">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
    </div>
  `).join('');

  // Citas por día — línea
  makeChart('c-dias', {
    type: 'line',
    data: {
      labels: por_dia.map(d => d.label),
      datasets: [{
        label: 'Citas',
        data: por_dia.map(d => d.total),
        borderColor: GOLD,
        backgroundColor: GOLD2,
        borderWidth: 2,
        pointBackgroundColor: GOLD,
        pointRadius: 4,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#2e2b25' } },
        x: { grid: { display: false } }
      }
    }
  });

  // Citas por barbero — barras horizontales
  makeChart('c-barberos', {
    type: 'bar',
    data: {
      labels: por_barbero.map(d => d.label),
      datasets: [{
        label: 'Citas',
        data: por_barbero.map(d => d.total),
        backgroundColor: COLORS,
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#2e2b25' } },
        y: { grid: { display: false } }
      }
    }
  });

  // Estados — dona
  const estadoLabels = { pendiente:'Pendiente', confirmada:'Confirmada', completada:'Completada', cancelada:'Cancelada' };
  const estadoColors = { pendiente:'#f0c040', confirmada:'#4caf82', completada:'#8a8274', cancelada:'#e07070' };
  makeChart('c-estados', {
    type: 'doughnut',
    data: {
      labels: por_estado.map(d => estadoLabels[d.label] || d.label),
      datasets: [{
        data: por_estado.map(d => d.total),
        backgroundColor: por_estado.map(d => estadoColors[d.label] || GOLD),
        borderWidth: 0,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } }
      }
    }
  });

  // Servicios — barras verticales
  makeChart('c-servicios', {
    type: 'bar',
    data: {
      labels: por_servicio.map(d => d.label),
      datasets: [{
        label: 'Citas',
        data: por_servicio.map(d => d.total),
        backgroundColor: COLORS,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#2e2b25' } },
        x: { grid: { display: false }, ticks: { maxRotation: 30 } }
      }
    }
  });

  // Ingresos — barras con formato peso
  makeChart('c-ingresos', {
    type: 'bar',
    data: {
      labels: por_servicio.map(d => d.label),
      datasets: [{
        label: 'Ingresos',
        data: por_servicio.map(d => d.ingresos),
        backgroundColor: 'rgba(201,168,76,0.7)',
        borderColor: GOLD,
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmt(ctx.raw)
          }
        }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#2e2b25' }, ticks: { callback: v => fmt(v) } },
        x: { grid: { display: false }, ticks: { maxRotation: 30 } }
      }
    }
  });
}

init();
</script>
</body>
</html>
